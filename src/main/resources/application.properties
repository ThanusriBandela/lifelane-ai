# ─────────────────────────────────────────
# LOCAL DEV  (uses H2 in-memory)
# ─────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:lifelane}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ─────────────────────────────────────────
# PRODUCTION (Render injects DATABASE_URL)
# Set DB_DRIVER=org.postgresql.Driver
# Set DB_DIALECT=org.hibernate.dialect.PostgreSQLDialect
